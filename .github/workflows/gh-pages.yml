name: GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      - name: Build Cargo Docs
        run: cargo doc --no-deps --all-features

      - name: Build Web Showcase
        working-directory: ./website
        run: trunk build --release --public-url /egui-elegant/showcase/

      - name: Prepare Deployment
        run: |
          mkdir deploy
          cp -r target/doc deploy/api
          cp -r website/dist deploy/showcase
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=showcase/"></head><body>Redirecting to showcase...</body></html>' > deploy/index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
